name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Validate repo contract
      run: |
        required_files=("bin/sysupdate" "lib/core.sh" "README.md")

        for file in "${required_files[@]}"; do
          test -f "$file" || { echo "Missing $file"; exit 1; }
        done

    - name: Check script exists
      run: |
        test -f bin/sysupdate || (echo "❌ bin/sysupdate missing" && exit 1)

    - name: Shell syntax check (entrypoint)
      run: bash -n bin/sysupdate

    - name: Shell syntax check (libs)
      run: bash -n lib/*.sh

    - name: Run tests
      run: |
        chmod +x tests/test.sh
        ./tests/test.sh
